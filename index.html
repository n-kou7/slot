<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>オリジナル告知スロット</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;height:100%;overflow:hidden;background:#12070a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;touch-action:manipulation}.wrap{height:100dvh;padding:10px;display:flex;justify-content:center}.machine{width:min(100%,760px);height:100%;display:grid;grid-template-rows:auto auto 1fr auto auto;gap:8px;border:5px solid #111;border-radius:26px;background:linear-gradient(#7c1524,#22070b 42%,#080808);padding:12px;box-shadow:inset 0 0 0 4px #b32735}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.title{font-weight:900;color:#ffd166;font-size:clamp(24px,5vw,42px);text-shadow:0 3px 0 #6e101a}.set{background:#111;border:2px solid #555;border-radius:12px;padding:7px;font-weight:800}select{font-size:20px;border-radius:8px;padding:4px 8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.stat{background:#050505;border:1px solid #444;border-radius:10px;text-align:center;padding:5px 2px}.stat b{display:block;color:#8cffb4;font-family:Menlo,monospace;font-size:clamp(20px,4vw,34px)}.stat span{font-size:11px;color:#aaa}.reelBox{position:relative;min-height:0;background:#111;border:4px solid #d7a92b;border-radius:22px;padding:10px}.reels{height:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.reel{position:relative;overflow:hidden;background:#fff5d7;border:5px solid #070707;border-radius:16px}.strip{position:absolute;left:0;right:0;top:0}.reel.spinning .strip{animation:spin .12s linear infinite}@keyframes spin{from{transform:translateY(-90px)}to{transform:translateY(0)}}.cell{height:90px;display:flex;align-items:center;justify-content:center;font-size:clamp(42px,12vw,84px);color:#111;border-bottom:1px solid #0001}.bar{font-size:clamp(26px,7vw,50px);font-weight:1000;background:#111;color:#fff;border-radius:10px;padding:4px 8px}.line{position:absolute;left:15px;right:15px;top:50%;height:4px;background:#ff2d55;box-shadow:0 0 12px #ff2d55;transform:translateY(-50%);pointer-events:none}.panel{display:grid;grid-template-columns:1fr 132px 1fr;gap:8px;align-items:center}.credit,.message{min-height:78px;background:#050505;border:2px solid #555;border-radius:15px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font-weight:900}.credit{flex-direction:column;color:#bbb}.credit b{font-size:clamp(32px,7vw,54px);font-family:Menlo,monospace;color:#8cffb4}.lamp{width:132px;height:132px;border-radius:50%;background:radial-gradient(circle,#666,#222 55%,#000);border:6px solid #050505;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:1000;color:#777}.lamp.on{background:radial-gradient(circle,#fff,#9ef0ff 28%,#00a6ff 62%,#00395f);color:white;text-shadow:0 0 10px #fff;box-shadow:0 0 28px #00c8ff,0 0 64px #00c8ff;animation:peka .6s infinite alternate}@keyframes peka{to{filter:brightness(1.25)}}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:0;border-radius:16px;color:white;font-weight:1000;min-height:58px;font-size:clamp(19px,4vw,32px);box-shadow:0 5px 0 #000,inset 0 2px 0 #fff5}.bet{background:linear-gradient(#68707a,#30343a)}.lever{background:linear-gradient(#ff4d5e,#b70c20)}.reset{background:linear-gradient(#8d99ae,#454a55)}.stopRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stop{min-height:76px;border-radius:999px;background:linear-gradient(#3f7cff,#10238e);font-size:clamp(28px,6vw,48px)}.btn:disabled{filter:grayscale(1) brightness(.45);transform:translateY(4px);box-shadow:0 2px 0 #000}.foot{font-size:11px;color:#aaa;text-align:center}@media (max-height:760px){.machine{gap:5px;padding:8px}.panel{grid-template-columns:1fr 96px 1fr}.lamp{width:96px;height:96px;font-size:21px}.credit,.message{min-height:58px;font-size:14px}.stop{min-height:56px}.btn{min-height:48px}.foot{display:none}}
</style>
</head>
<body>
<div class="wrap"><div class="machine">
  <div class="top"><div class="title">ペカっとスロット</div><div class="set">設定 <select id="setting"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option selected>6</option></select></div></div>
  <div class="stats"><div class="stat"><b id="games">0</b><span>G</span></div><div class="stat"><b id="big">0</b><span>BIG</span></div><div class="stat"><b id="reg">0</b><span>REG</span></div><div class="stat"><b id="grape">0</b><span>ぶどう</span></div></div>
  <div class="reelBox"><div class="reels"><div class="reel" id="r0"><div class="strip"></div></div><div class="reel" id="r1"><div class="strip"></div></div><div class="reel" id="r2"><div class="strip"></div></div></div><div class="line"></div></div>
  <div class="panel"><div class="credit">CREDIT<b id="credit">50</b></div><div class="lamp" id="lamp">PEKA</div><div class="message" id="msg">BETしてレバーON</div></div>
  <div><div class="controls"><button class="btn bet" id="bet">BET 3枚</button><button class="btn lever" id="lever">レバーON</button><button class="btn reset" id="reset">リセット</button></div><div class="stopRow" style="margin-top:8px"><button class="btn stop" id="s0" disabled>左 停止</button><button class="btn stop" id="s1" disabled>中 停止</button><button class="btn stop" id="s2" disabled>右 停止</button></div></div>
  <div class="foot">オリジナル配列・オリジナル告知タイプ。GitHub Pagesはこのファイル名を index.html にしてください。</div>
</div></div>
<script>
(()=>{
const mark={seven:'7️⃣',bar:'BAR',grape:'🍇',cherry:'🍒',replay:'🔁',bell:'🔔',blank:'⭐'};
const strips=[['bell','replay','grape','cherry','blank','seven','grape','bell','bar','replay','grape','blank','cherry','bell','grape','seven','replay','blank','grape','bar','bell'],['grape','bell','replay','blank','bar','grape','bell','cherry','replay','seven','grape','blank','bell','replay','grape','bar','blank','bell','seven','grape','cherry'],['replay','grape','bell','blank','seven','cherry','grape','replay','bell','bar','blank','grape','bell','replay','cherry','grape','seven','blank','bell','grape','bar']];
const prob={1:{big:1/273,reg:1/440,grape:1/6.4},2:{big:1/270,reg:1/400,grape:1/6.3},3:{big:1/268,reg:1/360,grape:1/6.2},4:{big:1/262,reg:1/315,grape:1/6.05},5:{big:1/258,reg:1/285,grape:1/5.9},6:{big:1/255,reg:1/255,grape:1/5.75}};
const $=id=>document.getElementById(id), reels=[$('r0'),$('r1'),$('r2')], stripEls=reels.map(r=>r.querySelector('.strip')), stops=[$('s0'),$('s1'),$('s2')];
let st={credit:50,bet:0,games:0,big:0,reg:0,grape:0,spin:false,stopped:[true,true,true],pos:[0,3,6],target:[0,0,0],flag:'none'};
function msg(t){$('msg').textContent=t} function lamp(v){$('lamp').classList.toggle('on',v)}
function update(){$('credit').textContent=st.credit;$('games').textContent=st.games;$('big').textContent=st.big;$('reg').textContent=st.reg;$('grape').textContent=st.grape;$('bet').disabled=st.spin||st.bet>0||st.credit<3;$('lever').disabled=st.spin||st.bet<3;stops.forEach((b,i)=>b.disabled=!st.spin||st.stopped[i])}
function draw(){strips.forEach((a,i)=>{stripEls[i].innerHTML='';a.concat(a,a).forEach(k=>{let d=document.createElement('div');d.className='cell';d.innerHTML=k==='bar'?'<span class="bar">BAR</span>':mark[k];stripEls[i].appendChild(d)});setReel(i,st.pos[i],false)})}
function cellH(){return 90} function setReel(i,p,ani=true){const n=strips[i].length;stripEls[i].style.transition=ani?'transform .18s ease-out':'none';stripEls[i].style.transform=`translateY(${-(n+p-1)*cellH()}px)`}
function flag(){const p=prob[$('setting').value],r=Math.random();let a=0;for(const [k,v] of [['big',p.big],['reg',p.reg],['grape',p.grape],['replay',1/7.3],['cherry',1/32],['bell',1/100]]){a+=v;if(r<a)return k}return 'none'}
function want(f){return f==='big'?'seven':f==='reg'?'bar':f==='grape'?'grape':f==='replay'?'replay':f==='cherry'?'cherry':f==='bell'?'bell':'blank'}
function targets(f){let w=want(f);return strips.map(a=>{if(f==='none')return Math.floor(Math.random()*a.length);let h=a.map((x,i)=>x===w?i:-1).filter(i=>i>=0);return h[Math.floor(Math.random()*h.length)]})}
function noAccident(){let c=st.pos.map((p,i)=>strips[i][p]);if(c[0]===c[1]&&c[1]===c[2])st.pos[2]=(st.pos[2]+1)%strips[2].length}
function bet(){if(st.credit<3||st.bet)return;st.credit-=3;st.bet=3;msg('レバーON！');update()}
function start(){if(st.spin||st.bet<3)return;st.games++;st.spin=true;st.stopped=[false,false,false];st.flag=flag();st.target=targets(st.flag);lamp(false);msg('左・中・右の停止ボタンで止めてね');reels.forEach(r=>r.classList.add('spinning'));update()}
function stop(i){if(!st.spin||st.stopped[i])return;st.stopped[i]=true;reels[i].classList.remove('spinning');st.pos[i]=st.target[i];if(st.flag==='none')noAccident();setReel(i,st.pos[i]);update();if(st.stopped.every(Boolean))setTimeout(finish,220)}
function finish(){st.spin=false;st.bet=0;let add=0,t='ハズレ',bonus=false;if(st.flag==='big'){add=252;t='BIG BONUS！';st.big++;bonus=true}else if(st.flag==='reg'){add=96;t='REG BONUS！';st.reg++;bonus=true}else if(st.flag==='grape'){add=7;t='ぶどう +7';st.grape++}else if(st.flag==='replay'){add=3;t='リプレイ 払戻し'}else if(st.flag==='cherry'){add=2;t='チェリー +2'}else if(st.flag==='bell'){add=10;t='ベル +10'}st.credit+=add;msg(t+(st.credit<3?' / CREDIT不足ならリセット':''));lamp(bonus);update()}
function reset(){st={credit:50,bet:0,games:0,big:0,reg:0,grape:0,spin:false,stopped:[true,true,true],pos:[0,3,6],target:[0,0,0],flag:'none'};reels.forEach(r=>r.classList.remove('spinning'));lamp(false);msg('BETしてレバーON');draw();update()}
$('bet').onclick=bet;$('lever').onclick=start;$('reset').onclick=reset;stops.forEach((b,i)=>b.onclick=()=>stop(i));draw();update();
})();
</script>
</body>
</html>
