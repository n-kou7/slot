<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WAN WAN REEL SMOOTH</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="machine">
  <header>
    <h1>WAN WAN REEL SMOOTH</h1>
    <p id="message">レバーONでリール回転</p>
  </header>

  <section class="reel-window">
    <div class="payline"></div>
    <div class="reel"><div class="strip" id="strip0"></div></div>
    <div class="reel"><div class="strip" id="strip1"></div></div>
    <div class="reel"><div class="strip" id="strip2"></div></div>
  </section>

  <section class="controls">
    <button id="leverBtn" class="btn lever">レバーON</button>
    <div class="stop-row">
      <button id="stop0" class="btn stop" disabled>左停止</button>
      <button id="stop1" class="btn stop" disabled>中停止</button>
      <button id="stop2" class="btn stop" disabled>右停止</button>
    </div>
    <button id="resetBtn" class="btn reset">位置リセット</button>
  </section>

  <section class="info">
    <div>左 <b id="info0">-</b></div>
    <div>中 <b id="info1">-</b></div>
    <div>右 <b id="info2">-</b></div>
  </section>
</main>
<script src="js/reel.js?v=3"></script>
</body>
</html>
